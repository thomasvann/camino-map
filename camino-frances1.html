<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sierra's Camino Francés — Interactive Map</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a2a3a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 { color: #f5e6c8; font-size: 22px; font-weight: 600; letter-spacing: 0.04em; margin-bottom: 4px; text-align: center; }
  .subtitle { color: #e8c87a; font-size: 13px; margin-bottom: 16px; text-align: center; letter-spacing: 0.05em; }
  .layout { display: flex; gap: 14px; width: 100%; max-width: 1140px; align-items: flex-start; }

  /* MAP */
  .map-wrap { flex: 1; position: relative; border-radius: 10px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5); min-width: 0; background: #c8b882; }
  .map-wrap img.bg { display: block; width: 100%; aspect-ratio: 1200 / 570; object-fit: fill; user-select: none; pointer-events: none; }
  .pins-layer { position: absolute; inset: 0; width: 100%; height: 100%; }

  .pin { position: absolute; transform: translate(-50%, -50%); cursor: pointer; z-index: 10; }
  .pin svg { display: block; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6)); transition: transform 0.15s ease; }
  .pin:hover svg { transform: scale(1.25); }
  .pin.main-stop svg circle.body  { fill: #e8400a; }
  .pin.final-stop svg circle.body { fill: #6a0dad; }
  .pin.sub-stop svg circle.body   { fill: #ffffff; stroke: #e8400a; stroke-width: 2; }

  .pin-label {
    position: absolute;
    top: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: 9.5px;
    font-weight: 700;
    color: #fff;
    background: rgba(0,0,0,0.55);
    padding: 1px 4px;
    border-radius: 3px;
    text-shadow: 0 1px 2px #000;
    pointer-events: none;
    letter-spacing: 0.03em;
  }

  /* TOOLTIP */
  .tooltip { position: fixed; background: #fff; border-radius: 10px; box-shadow: 0 6px 24px rgba(0,0,0,0.25); padding: 0; max-width: 220px; pointer-events: none; z-index: 9999; display: none; overflow: hidden; border: 1px solid rgba(0,0,0,0.12); }
  .tip-img { width: 100%; height: 100px; object-fit: cover; display: block; background: #ddd; }
  .tip-body { padding: 9px 11px 11px; }
  .tip-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; }
  .tip-tag.main  { color: #b83000; }
  .tip-tag.final { color: #6a0dad; }
  .tip-tag.sub   { color: #555; }
  .tip-name { font-size: 13px; font-weight: 700; color: #1a1a1a; margin-bottom: 5px; line-height: 1.3; }
  .tip-desc { font-size: 11.5px; color: #444; line-height: 1.55; }
  .tip-cta { display: inline-block; margin-top: 7px; font-size: 11px; font-weight: 600; color: #b83000; }

  /* SIDEBAR */
  .sidebar { width: 235px; flex-shrink: 0; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 12px; max-height: 680px; overflow-y: auto; }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
  .sb-section { margin-bottom: 12px; }
  .sb-section-title { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); padding: 0 2px 5px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 5px; }
  .sb-link { display: flex; align-items: flex-start; gap: 8px; padding: 7px 8px; border-radius: 7px; text-decoration: none; color: #f0e8d4; font-size: 11.5px; line-height: 1.35; transition: background 0.14s; cursor: pointer; }
  .sb-link:hover { background: rgba(232,64,10,0.18); color: #f5d080; }
  .sb-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; }
  .sb-dot.main  { background: #e8400a; }
  .sb-dot.final { background: #6a0dad; }
  .sb-dot.sub   { background: #fff; border: 1.5px solid #e8400a; }

  /* LEGEND */
  .legend { display: flex; gap: 16px; margin-top: 10px; font-size: 11px; color: rgba(255,255,255,0.55); justify-content: center; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .ld { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .ld.main  { background: #e8400a; }
  .ld.final { background: #6a0dad; }
  .ld.sub   { background: #fff; border: 1.5px solid #e8400a; }
</style>
</head>

/* Build pins */
function makePinSVG(type) {
  const big  = type === "final";
  const r    = big ? 9 : 7;
  const size = (r + 4) * 2;
  const cx   = r + 4;
  const colors = {
    main:  { fill: "#e8400a", stroke: "#fff" },
    final: { fill: "#6a0dad", stroke: "#fff" },
    sub:   { fill: "#fff",    stroke: "#e8400a" }
  };
  const c = colors[type] || colors.sub;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
    <circle class="body" cx="${cx}" cy="${cx}" r="${r}" fill="${c.fill}" stroke="${c.stroke}" stroke-width="2.5"/>
  </svg>`;
}

function buildPin(item, type, isMain) {
  const pin      = document.createElement("div");
  pin.className  = `pin ${type}-stop`;
  pin.style.left = item.x + "%";
  pin.style.top  = item.y + "%";
  pin.innerHTML  = makePinSVG(type);
  if (isMain) {
    const lbl       = document.createElement("div");
    lbl.className   = "pin-label";
    lbl.textContent = item.name;
    pin.appendChild(lbl);
  }
  pin.addEventListener("mouseenter", (e) => showTip(e, item, type));
  pin.addEventListener("mousemove",  positionTip);
  pin.addEventListener("mouseleave", hideTip);
  pin.addEventListener("click", () => window.open(item.url, "_blank", "noopener"));
  return pin;
}

const pinsLayer = document.getElementById("pinsLayer");
stops.forEach(stop => {
  pinsLayer.appendChild(buildPin(stop, stop.type, true));
  stop.subs.forEach(sub => pinsLayer.appendChild(buildPin(sub, "sub", false)));
});

/* Sidebar */
const sidebar = document.getElementById("sidebar");
stops.forEach(stop => {
  const section = document.createElement("div");
  section.className = "sb-section";
  const title = document.createElement("div");
  title.className = "sb-section-title";
  title.textContent = stop.name;
  section.appendChild(title);
  const mainLink = document.createElement("a");
  mainLink.className = "sb-link";
  mainLink.href = stop.url;
  mainLink.target = "_blank";
  mainLink.rel = "noopener";
  mainLink.innerHTML = `<span class="sb-dot ${stop.type}"></span><span>${stop.label}</span>`;
  section.appendChild(mainLink);
  stop.subs.forEach(sub => {
    const subLink = document.createElement("a");
    subLink.className = "sb-link";
    subLink.href = sub.url;
    subLink.target = "_blank";
    subLink.rel = "noopener";
    subLink.style.paddingLeft = "20px";
    subLink.innerHTML = `<span class="sb-dot sub"></span><span>${sub.name}</span>`;
    section.appendChild(subLink);
  });
  sidebar.appendChild(section);
});

/* Tooltip */
const tip     = document.getElementById("tooltip");
const tipImg  = document.getElementById("tipImg");
const tipTag  = document.getElementById("tipTag");
const tipName = document.getElementById("tipName");
const tipDesc = document.getElementById("tipDesc");
const tagLabels = { main: "Main Stop", final: "Final Destination", sub: "Activity" };

function showTip(e, item, type) {
  tipImg.src = item.img || "";
  tipImg.onerror = () => { tipImg.style.display = "none"; };
  tipImg.onload  = () => { tipImg.style.display = "block"; };
  tipTag.textContent  = tagLabels[type] || "Stop";
  tipTag.className    = `tip-tag ${type}`;
  tipName.textContent = item.name;
  tipDesc.textContent = item.desc;
  tip.style.display   = "block";
  positionTip(e);
}
function hideTip() { tip.style.display = "none"; }
function positionTip(e) {
  tip.style.left = Math.min(e.clientX + 16, window.innerWidth  - 230) + "px";
  tip.style.top  = Math.max(e.clientY - 20, 8)                        + "px";
}
document.addEventListener("mousemove", (e) => { if (tip.style.display === "block") positionTip(e); });
</script>
